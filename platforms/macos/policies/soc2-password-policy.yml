- name: SOC 2 - Password minimum length enforced
  query: SELECT 1 FROM password_policy WHERE policy_identifier = 'minLength' AND CAST(policy_content AS INTEGER) >= 12;
  critical: true
  description: User account passwords must be at least 12 characters to resist brute-force attacks. SOC 2 CC6.1.
  resolution: |
    Enforced by the SOC 2 - Password Policy configuration profile. End users will be prompted to update their password at next login if it does not meet the requirement.
  platform: darwin

- name: SOC 2 - Password complexity enforced
  query: SELECT 1 FROM password_policy WHERE policy_identifier = 'requireAlphanumeric' AND policy_content = '1';
  critical: false
  description: Passwords must contain both letters and numbers. SOC 2 CC6.1.
  resolution: |
    Enforced by the SOC 2 - Password Policy configuration profile.
  platform: darwin
